<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kohët Mujore të Namazit</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:#f3f6fb;
  padding:10px;
  color:#0f172a;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:10px;
}

.header h1{
  font-size:18px;
  font-weight:800;
}

.header p{
  font-size:13px;
  color:#64748b;
}

/* CARD */
.month{
  background:white;
  border-radius:10px;
  overflow:hidden;
  margin-bottom:18px;
  box-shadow:0 4px 15px rgba(0,0,0,0.06);
}

/* TITLE */
.month h2{
  background:#16a34a;
  color:white;
  padding:8px;
  font-size:14px;
  text-align:center;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

/* HEADER ROW */
th{
  background:#16a34a;
  color:white;
  padding:8px;
  font-size:12px;
}

/* CELLS */
td{
  padding:7px;
  text-align:center;
  font-size:12px;
  border-bottom:1px solid #e5e7eb;
}

/* FIRST COLUMN (DATA + DITA) */
td:first-child{
  text-align:left;
  font-weight:600;
  padding-left:10px;
}

/* ZEBRA */
tr:nth-child(even){
  background:#f8fafc;
}

/* 🔵 FRIDAY HIGHLIGHT (SI FOTO) */
.friday{
  background:#0ea5a4 !important;
  color:white;
  font-weight:600;
}

/* FRIDAY TEXT FIX */
.friday td{
  color:white;
}

/* CLOSE BUTTON */
.close{
  position:fixed;
  top:10px;
  right:12px;
  font-size:26px;
  cursor:pointer;
  font-weight:bold;
  color:#0f172a;
}

/* MOBILE */
@media(max-width:600px){
  th,td{
    font-size:10px;
    padding:6px;
  }
}
</style>
</head>

<body>

<div class="close" onclick="closePage()">✖</div>

<div class="header">
  <h1>Kohët Mujore të Namazit</h1>
  <p>Xhamia e fshatit Merovë</p>
</div>

<div id="container"></div>

<script>

// 👉 lexon nga data.json
fetch("data.json")
.then(res => res.json())
.then(data => {

  const months = {
    "01":"Janar",
    "02":"Shkurt",
    "03":"Mars",
    "04":"Prill",
    "05":"Maj"
  };

  let grouped = {};

  data.forEach(d=>{
    let m = d.Data.split("-")[1];
    if(!grouped[m]) grouped[m]=[];
    grouped[m].push(d);
  });

  let container = document.getElementById("container");

  for(let m in months){
    if(!grouped[m]) continue;

    let html = `
    <div class="month">
      <h2>${months[m]}</h2>

      <table>
        <tr>
          <th>Data</th>
          <th>Imsaku</th>
          <th>Sabahu</th>
          <th>Dreka</th>
          <th>Ikindija</th>
          <th>Akshami</th>
          <th>Jacia</th>
        </tr>
    `;

    grouped[m].forEach(d=>{

      let day = d.Data.split("-")[2];

      // 👉 e premte (Friday highlight)
      let dateObj = new Date(d.Data);
      let isFriday = dateObj.getDay() === 5;

      html += `
        <tr class="${isFriday ? 'friday' : ''}">
          <td>${day}</td>
          <td>${d.Imsak}</td>
          <td>${d.Sabahu}</td>
          <td>${d.Dreka}</td>
          <td>${d.Ikindija}</td>
          <td>${d.Akshami}</td>
          <td>${d.Jacia}</td>
        </tr>
      `;
    });

    html += `</table></div>`;
    container.innerHTML += html;
  }

});

function closePage(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
