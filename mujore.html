<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kohët Mujore të Namazit</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Segoe UI, sans-serif;
}

body{
  background:#f8fafc;
  padding:12px;
  color:#0f172a;
}

/* HEADER */
.header{
  text-align:center;
  margin-bottom:18px;
}

.header h1{
  font-size:20px;
  font-weight:800;
  color:#16a34a;
}

.header p{
  font-size:13px;
  color:#64748b;
}

/* MONTH CARD */
.month{
  margin-bottom:18px;
  background:white;
  border-radius:14px;
  overflow:hidden;
  box-shadow:0 8px 20px rgba(0,0,0,0.06);
  border:1px solid #e2e8f0;
}

/* MONTH TITLE (PA ZEZE 😄) */
.month h2{
  background:linear-gradient(90deg,#22c55e,#16a34a);
  color:white;
  padding:10px;
  font-size:15px;
  letter-spacing:0.5px;
}

/* TABLE */
table{
  width:100%;
  border-collapse:collapse;
}

th{
  background:#e0f2fe;
  color:#0f172a;
  padding:9px;
  font-size:12px;
  border-bottom:1px solid #bae6fd;
}

td{
  padding:8px;
  text-align:center;
  font-size:12px;
  border-bottom:1px solid #e2e8f0;
}

/* dita */
td:first-child{
  text-align:left;
  font-weight:700;
  color:#16a34a;
}

/* zebra */
tr:nth-child(even){
  background:#f9fafb;
}

/* hover */
tr:hover{
  background:#ecfeff;
  transition:0.2s;
}

/* CLOSE BUTTON */
.close{
  position:fixed;
  top:10px;
  right:12px;
  font-size:26px;
  cursor:pointer;
  font-weight:bold;
  color:#16a34a;
}

/* responsive */
@media(max-width:600px){
  th,td{
    font-size:10px;
    padding:6px;
  }
}
</style>
</head>

<body>

<div class="close" onclick="closePage()">✖</div>

<div class="header">
  <h1>Kohët Mujore të Namazit</h1>
  <p>Xhamia e fshatit Merovë</p>
</div>

<div id="container"></div>

<script>

// 👉 Lexon direkt nga data.json
fetch("data.json")
.then(res => res.json())
.then(data => {

  const months = {
    "01":"Janar",
    "02":"Shkurt",
    "03":"Mars",
    "04":"Prill",
    "05":"Maj"
  };

  let grouped = {};

  data.forEach(d=>{
    let m = d.Data.split("-")[1];
    if(!grouped[m]) grouped[m]=[];
    grouped[m].push(d);
  });

  let container = document.getElementById("container");

  for(let m in months){
    if(!grouped[m]) continue;

    let html = `
    <div class="month">
      <h2>${months[m]}</h2>
      <table>
        <tr>
          <th>Data</th>
          <th>Sabahu</th>
          <th>Dreka</th>
          <th>Ikindija</th>
          <th>Akshami</th>
          <th>Jacia</th>
        </tr>
    `;

    grouped[m].forEach(d=>{
      let day = d.Data.split("-")[2];

      html += `
        <tr>
          <td>${day}</td>
          <td>${d.Sabahu}</td>
          <td>${d.Dreka}</td>
          <td>${d.Ikindija}</td>
          <td>${d.Akshami}</td>
          <td>${d.Jacia}</td>
        </tr>
      `;
    });

    html += `</table></div>`;
    container.innerHTML += html;
  }

});

function closePage(){
  window.location.href = "index.html";
}

</script>

</body>
</html>
