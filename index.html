<!DOCTYPE html>
<html lang="sq">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Takvim - Xhamia Merovë</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}

body{
  background:#f8fafc;
  color:#0f172a;
}

/* HEADER */
header{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 16px;
}

.burger{
  font-size:26px;
  cursor:pointer;
}

/* 🔥 TITULLI MË I MADH */
.title{
  text-align:center;
  flex:1;
}

.title h1{
  font-size:30px;   /* MË I MADH */
  font-weight:800;
  color:#0f172a;
}

/* 📅 DATA MË E MADHE */
.title p{
  font-size:18px;   /* MË E MADHE */
  color:#64748b;
  margin-top:2px;
}

/* 🟢 HIXHRI MË I THEKSUAR */
#hijri{
  font-size:18px;
  color:#16a34a;
  font-weight:700;
  margin-top:2px;
}

/* SIDEBAR */
.sidebar{
  position:fixed;
  left:-260px;
  top:0;
  width:260px;
  height:100%;
  background:#ffffff;
  padding:20px;
  transition:0.3s;
  box-shadow:5px 0 25px rgba(0,0,0,0.1);
  z-index:999;
}

.sidebar.active{ left:0; }

.close-btn{
  font-size:22px;
  cursor:pointer;
  display:block;
  text-align:right;
  margin-bottom:15px;
}

.sidebar a{
  display:block;
  margin:10px 0;
  padding:12px;
  border-radius:12px;
  text-decoration:none;
  color:#0f172a;
  background:#f1f5f9;
}

/* CONTAINER */
.container{ padding:15px; }

.next-box{
  background:#22c55e;
  border-radius:18px;
  padding:20px;
  text-align:center;
  color:white;
  margin-bottom:20px;
}

.countdown{
  font-size:26px;
  font-weight:bold;
}

/* LIST */
.list{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.item{
  display:flex;
  justify-content:space-between;
  padding:14px;
  background:white;
  border-radius:14px;
}

.item.active{
  background:#16a34a;
  color:white;
}

.time{font-weight:bold;}

</style>
</head>

<body>

<header>
  <div class="burger" onclick="toggleMenu()">☰</div>

  <div class="title">
    <h1>Xhamia e fshatit Merovë</h1>
    <p id="date"></p>
    <p id="hijri"></p>
  </div>
</header>

<div class="sidebar" id="sidebar">
  <span class="close-btn" onclick="toggleMenu()">✖</span>
  <a href="#">Ditët dhe netët e dalluara</a>
  <a href="#">Imsakije</a>
  <a href="#">Kohet mujore të namazit</a>
</div>

<div class="container">

  <div class="next-box">
    <h2 id="nextPrayer">Koha e radhës</h2>
    <div class="countdown" id="countdown">00:00:00</div>
  </div>

  <div class="list" id="times"></div>

</div>

<script>

const prayerData = {
  "2026-03-21": {
    imsak: "05:00",
    fajr: "05:10",
    dhuhr: "12:05",
    asr: "15:30",
    maghrib: "18:10",
    isha: "19:30"
  }
};

function toggleMenu(){
  document.getElementById("sidebar").classList.toggle("active");
}

function getToday(){
  return new Date().toISOString().split("T")[0];
}

function capitalize(text){
  return text.charAt(0).toUpperCase() + text.slice(1);
}

/* DATE */
function formatDate(){
  const d = new Date();
  let day = d.toLocaleDateString("sq-AL",{weekday:"long"});
  day = capitalize(day);

  let rest = d.toLocaleDateString("sq-AL",{year:"numeric",month:"long",day:"numeric"});

  document.getElementById("date").innerText = day + ", " + rest;
}

/* HIXHRI */
function formatHijri(){
  const d = new Date();

  const parts = new Intl.DateTimeFormat('en-TN-u-ca-islamic',{
    day:'numeric',
    month:'numeric',
    year:'numeric'
  }).formatToParts(d);

  let day = parts.find(p=>p.type==="day").value;
  let month = parts.find(p=>p.type==="month").value;
  let year = parts.find(p=>p.type==="year").value;

  const months = {
    "1":"Muharrem",
    "2":"Safar",
    "3":"Rebiul-Evvel",
    "4":"Rebiul-Ahir",
    "5":"Xhumadel-Ula",
    "6":"Xhumadel-Ahire",
    "7":"Rexheb",
    "8":"Shaban",
    "9":"Ramazan",
    "10":"Sheval",
    "11":"Dhul-Kade",
    "12":"Dhul-Hixhe"
  };

  let monthSq = months[month] || month;

  document.getElementById("hijri").innerText =
    "Hixhri: " + day + " " + monthSq + " " + year;
}

/* REST OF CODE (pa ndryshim) */
function renderTimes(){
  const data = prayerData[getToday()];
  const container = document.getElementById("times");

  const names = {
    imsak:"Imsaku",
    fajr:"Sabahu",
    dhuhr:"Dreka",
    asr:"Ikindia",
    maghrib:"Akshami",
    isha:"Jacia"
  };

  container.innerHTML = "";

  const order = ["imsak","fajr","dhuhr","asr","maghrib","isha"];

  order.forEach(key=>{
    if(data[key]){
      container.innerHTML += `
        <div class="item" id="${key}">
          <span>${names[key]}</span>
          <span class="time">${data[key]}</span>
        </div>
      `;
    }
  });
}

function update(){
  const data = prayerData[getToday()];
  const now = new Date();

  const names = {
    imsak:"Imsaku",
    fajr:"Sabahu",
    dhuhr:"Dreka",
    asr:"Ikindia",
    maghrib:"Akshami",
    isha:"Jacia"
  };

  let order = ["imsak","fajr","dhuhr","asr","maghrib","isha"];

  let nextKey = null;
  let nextTime = null;

  for(let key of order){
    let tData = data[key];
    if(!tData) continue;

    let [h,m] = tData.split(":");
    let t = new Date();
    t.setHours(h,m,0);

    if(t > now){
      nextKey = key;
      nextTime = t;
      break;
    }
  }

  if(!nextKey){
    nextKey = "imsak";
    nextTime = new Date();
    nextTime.setHours(23,59,59);
  }

  let diff = nextTime - now;

  let h = Math.floor(diff/1000/60/60);
  let m = Math.floor(diff/1000/60)%60;
  let s = Math.floor(diff/1000)%60;

  document.getElementById("countdown").innerText =
    String(h).padStart(2,'0')+":"+
    String(m).padStart(2,'0')+":"+
    String(s).padStart(2,'0');

  document.getElementById("nextPrayer").innerText =
    "Koha e radhës: " + names[nextKey];

  document.querySelectorAll(".item").forEach(e=>e.classList.remove("active"));

  if(nextKey){
    document.getElementById(nextKey).classList.add("active");
  }
}

formatDate();
formatHijri();
renderTimes();
setInterval(update,1000);

</script>

</body>
</html>
